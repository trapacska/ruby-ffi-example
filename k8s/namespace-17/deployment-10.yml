apiVersion: apps/v1
kind: Deployment
metadata:
  name: svc-17-10
  namespace: ns-17
spec:
  replicas: 3
  template:
    spec:
      containers:
      - name: app
        image: registry.io/app-17-10:latest
        ports:
        - containerPort: 8080
        env:
        - name: ENV
          value: production
        resources:
          limits:
            memory: 512Mi
            cpu: 500m
